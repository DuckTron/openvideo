        // Actual Compositor render function (matching export-modal implementation)
        async function render() {
            console.log('Starting render with Compositor...');
            console.log('Project:', projectData.settings);
            console.log('Tracks:', projectData.tracks.length);
            console.log('Clips:', Object.keys(projectData.clips).length);
            
            try {
                // Create compositor options (matching export-modal defaults)
                const compositorOptions = {
                    width: projectData.settings.width,
                    height: projectData.settings.height,
                    fps: projectData.settings.fps,
                    backgroundColor: projectData.settings.backgroundColor || '#000000',
                    format: 'mp4',
                    videoCodec: 'avc1.640033', // WebCodecs codec string (not FFmpeg name)
                    bitrate: 12000000,
                    audio: true,
                    audioCodec: 'aac',
                    audioSampleRate: 48000,
                };
                
                console.log('Creating Compositor with options:', compositorOptions);
                
                // Create compositor (exactly like export-modal)
                const com = new Compositor(compositorOptions);
                
                // Initialize PixiJS app (exactly like export-modal)
                await com.initPixiApp();
                console.log('Compositor initialized');
                
                // Add progress listener (like export-modal)
                com.on("export:progress", (progress) => {
                    console.log('Export progress:', progress);
                });
                
                // Load project data (exactly like export-modal — pass the object directly, not a JSON string)
                await com.loadFromJSON(projectData);
                console.log('Project data loaded');
                
                // Get output stream (exactly like export-modal)
                const stream = com.output();
                const blob = await new Response(stream).blob();
                
                console.log('Video blob created, size:', blob.size, 'type:', blob.type);
                
                // Signal completion
                window.renderComplete = true;
                window.videoBlob = blob;
                
                console.log('Render complete with actual Compositor!');
                
            } catch (error) {
                console.error('Compositor render failed:', error);
                window.renderError = error.message;
            }
        }
        
        // Start rendering when page loads
        window.addEventListener('load', render);
